<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>Plan → GLB → IFC</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    margin: 0;
    padding: 2rem;
    max-width: 720px;
    margin-inline: auto;
    line-height: 1.5;
  }
  h1 { margin-top: 0; }
  .card {
    border: 1px solid color-mix(in srgb, currentColor 20%, transparent);
    border-radius: 8px;
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  label { display: block; margin: .5rem 0 .25rem; font-size: .9rem; }
  input[type=number], input[type=file] {
    width: 100%;
    padding: .5rem;
    border-radius: 6px;
    border: 1px solid color-mix(in srgb, currentColor 30%, transparent);
    background: transparent;
    color: inherit;
    font: inherit;
  }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  button {
    padding: .65rem 1.2rem;
    border-radius: 6px;
    border: 0;
    background: #2563eb;
    color: white;
    font: inherit;
    cursor: pointer;
  }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .status {
    margin-top: 1rem;
    padding: .75rem;
    border-radius: 6px;
    background: color-mix(in srgb, currentColor 8%, transparent);
    white-space: pre-wrap;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: .85rem;
    min-height: 2.5rem;
  }
  .hint { font-size: .8rem; opacity: .7; margin-top: .25rem; }
  a.dl {
    display: inline-block;
    margin-top: 1rem;
    padding: .5rem .9rem;
    background: #16a34a;
    color: white;
    text-decoration: none;
    border-radius: 6px;
  }
</style>
</head>
<body>

<h1>Plan → GLB</h1>
<p>
  Détecte les murs sur un plan image et produit un <code>.glb</code> qui passe
  ensuite dans le converter <a href="/">GLB → IFC</a> de ce projet.
</p>

<form id="f" class="card">
  <label for="image">Plan (PNG / JPG, fond clair, murs sombres)</label>
  <input id="image" name="image" type="file" accept="image/*" required />

  <div class="row">
    <div>
      <label for="scale">Échelle (mm par pixel)</label>
      <input id="scale" name="scale_mm_per_px" type="number" step="0.01" min="0.01" value="10" required />
      <div class="hint">Ex : si 1 px de l'image = 10 mm dans la réalité, mettre 10.</div>
    </div>
    <div>
      <label for="height">Hauteur des murs (m)</label>
      <input id="height" name="wall_height_m" type="number" step="0.01" min="0.1" value="2.5" required />
    </div>
  </div>

  <div style="margin-top:1rem;">
    <button id="go" type="submit">Détecter et générer le GLB</button>
  </div>
</form>

<div id="status" class="status">En attente…</div>
<div id="dl"></div>

<script>
const form = document.getElementById("f");
const status = document.getElementById("status");
const dl = document.getElementById("dl");
const btn = document.getElementById("go");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  dl.innerHTML = "";
  btn.disabled = true;
  status.textContent = "Envoi & détection en cours…";

  const fd = new FormData(form);
  try {
    const r = await fetch("/plan2glb", { method: "POST", body: fd });
    if (!r.ok) {
      const txt = await r.text();
      throw new Error(`HTTP ${r.status} — ${txt}`);
    }
    const wallCount = r.headers.get("X-Wall-Count") || "?";
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);

    status.textContent = `OK — ${wallCount} mur(s) détecté(s).`;
    const a = document.createElement("a");
    a.href = url;
    a.download = "plan.glb";
    a.className = "dl";
    a.textContent = "Télécharger plan.glb";
    dl.appendChild(a);

    const hint = document.createElement("p");
    hint.innerHTML = 'Charge ensuite ce GLB dans le <a href="/">converter principal</a> pour obtenir l\'IFC.';
    dl.appendChild(hint);
  } catch (err) {
    status.textContent = "Erreur : " + err.message;
  } finally {
    btn.disabled = false;
  }
});
</script>

</body>
</html>
